<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRacing Calendar by Horrillo | Calendario Completo de Series</title>
    <meta name="description" content="Calendario completo de iRacing con todas las series, circuitos, clima y eventos especiales. Actualizado cada temporada por Horrillo.">
    <meta name="theme-color" content="#8B5CF6">
    
    <!-- Open Graph -->
    <meta property="og:title" content="iRacing Calendar by Horrillo">
    <meta property="og:description" content="El calendario más completo de iRacing. Todas las series, circuitos y condiciones de carrera.">
    <meta property="og:image" content="/logo.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="/logo.png">
    
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-card: #16161a;
            --bg-hover: #1e1e24;
            --bg-input: #0d0d0f;
            
            --purple-primary: #8B5CF6;
            --purple-light: #A78BFA;
            --purple-dark: #7C3AED;
            --purple-glow: rgba(139, 92, 246, 0.4);
            --purple-subtle: rgba(139, 92, 246, 0.1);
            
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            
            --border-color: rgba(255,255,255,0.08);
            --border-hover: rgba(139, 92, 246, 0.5);
            
            --success: #22C55E;
            --warning: #F59E0B;
            --danger: #EF4444;
            
            --license-r: #DC2626;
            --license-d: #F97316;
            --license-c: #EAB308;
            --license-b: #22C55E;
            --license-a: #3B82F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Background Grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: -1;
        }

        /* ============================================
           HEADER
        ============================================ */
        .header {
            position: relative;
            padding: 2rem 1.5rem;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 150%;
            height: 200%;
            background: radial-gradient(ellipse at center, var(--purple-glow) 0%, transparent 60%);
            opacity: 0.3;
            pointer-events: none;
        }

        .header-content {
            position: relative;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--purple-glow));
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.05em;
            line-height: 1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--purple-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .season-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .season-badge {
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, var(--purple-primary), var(--purple-dark));
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 0 4px 15px var(--purple-glow);
        }

        .social-links {
            display: flex;
            gap: 0.75rem;
        }

        .social-link {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--purple-primary);
            border-color: var(--purple-primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--purple-glow);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
        }

        /* ============================================
           NAVIGATION
        ============================================ */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-tabs {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 0.25rem;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            flex-shrink: 0;
            padding: 0.6rem 1.25rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-tab:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--purple-primary);
        }

        .nav-tab.active {
            background: var(--purple-primary);
            border-color: var(--purple-primary);
            color: white;
            box-shadow: 0 4px 12px var(--purple-glow);
        }

        .nav-tab.special {
            border-color: var(--warning);
            color: var(--warning);
        }

        .nav-tab.special.active {
            background: linear-gradient(135deg, var(--warning), #D97706);
            border-color: transparent;
            color: black;
        }

        /* ============================================
           MAIN CONTENT
        ============================================ */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .category-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .category-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           LICENSE SECTIONS
        ============================================ */
        .license-section {
            margin-bottom: 2rem;
        }

        .license-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid;
        }

        .license-header.R { border-left-color: var(--license-r); }
        .license-header.D { border-left-color: var(--license-d); }
        .license-header.C { border-left-color: var(--license-c); }
        .license-header.B { border-left-color: var(--license-b); }
        .license-header.A { border-left-color: var(--license-a); }

        .license-badge {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.25rem;
        }

        .license-badge.R { background: linear-gradient(135deg, #991B1B, var(--license-r)); }
        .license-badge.D { background: linear-gradient(135deg, #C2410C, var(--license-d)); }
        .license-badge.C { background: linear-gradient(135deg, #A16207, var(--license-c)); color: black; }
        .license-badge.B { background: linear-gradient(135deg, #166534, var(--license-b)); }
        .license-badge.A { background: linear-gradient(135deg, #1E40AF, var(--license-a)); }

        .license-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .license-count {
            margin-left: auto;
            padding: 0.25rem 0.75rem;
            background: var(--bg-card);
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .expand-btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-family: 'Barlow', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: var(--purple-primary);
            border-color: var(--purple-primary);
            color: white;
        }

        /* ============================================
           SERIES GRID
        ============================================ */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1rem;
        }

        .series-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .series-card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .series-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 1rem;
            background: linear-gradient(135deg, var(--purple-subtle), transparent);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .series-header:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), transparent);
        }

        .series-name {
            flex: 1;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .series-tag {
            padding: 0.2rem 0.5rem;
            background: var(--purple-primary);
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .series-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .series-card.expanded .series-toggle {
            transform: rotate(180deg);
        }

        /* ============================================
           WEEKS LIST
        ============================================ */
        .weeks-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .series-card.expanded .weeks-container {
            max-height: 700px;
            overflow-y: auto;
        }

        .weeks-container::-webkit-scrollbar {
            width: 6px;
        }

        .weeks-container::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .weeks-container::-webkit-scrollbar-thumb {
            background: var(--purple-primary);
            border-radius: 3px;
        }

        .weeks-list {
            padding: 0.5rem;
        }

        .week-row {
            display: grid;
            grid-template-columns: 42px 1fr 55px 65px;
            gap: 0.5rem;
            padding: 0.5rem 0.6rem;
            background: var(--bg-primary);
            border-radius: 6px;
            margin-bottom: 0.3rem;
            align-items: center;
            transition: background 0.2s ease;
        }

        .week-row:hover {
            background: var(--bg-hover);
        }

        .week-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            color: var(--purple-light);
        }

        .week-track {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .week-temp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: right;
        }

        .week-weather {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.25rem;
            font-size: 0.75rem;
        }

        .weather-icon {
            font-size: 1rem;
        }

        .rain-chance {
            font-weight: 600;
        }

        .rain-low { color: var(--success); }
        .rain-med { color: var(--warning); }
        .rain-high { color: var(--danger); }

        /* ============================================
           SPECIAL EVENTS
        ============================================ */
        .special-event-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(217, 119, 6, 0.05));
            border: 1px solid var(--warning);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .special-event-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: var(--warning);
            color: black;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .special-event-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.75rem;
            color: var(--warning);
            margin-bottom: 1rem;
        }

        .special-event-details {
            display: grid;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .special-event-details strong {
            color: var(--text-primary);
        }

        /* ============================================
           FOOTER
        ============================================ */
        .footer {
            margin-top: 3rem;
            padding: 2rem 1rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .footer-logo {
            width: 40px;
            height: 40px;
        }

        .footer-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.25rem;
            color: var(--purple-light);
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .footer-social-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .footer-social-link:hover {
            background: var(--purple-primary);
            border-color: var(--purple-primary);
            color: white;
        }

        .footer-social-link svg {
            width: 18px;
            height: 18px;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .footer-text a {
            color: var(--purple-light);
            text-decoration: none;
        }

        /* ============================================
           LEGEND
        ============================================ */
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 1rem;
            margin-top: 2rem;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* ============================================
           LOADING STATE
        ============================================ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--purple-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .error-message {
            padding: 2rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            text-align: center;
            color: var(--danger);
        }

        /* ============================================
           RESPONSIVE
        ============================================ */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .brand {
                flex-direction: column;
            }

            .logo {
                width: 60px;
                height: 60px;
            }

            .brand-title {
                font-size: 1.5rem;
            }

            .series-grid {
                grid-template-columns: 1fr;
            }

            .week-row {
                grid-template-columns: 38px 1fr 50px 55px;
                font-size: 0.75rem;
            }

            .footer-social {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <footer class="footer">
        <div class="footer-brand">
            <img src="/logo.png" alt="Horrillo" class="footer-logo">
            <span class="footer-name">HORRILLO</span>
        </div>
